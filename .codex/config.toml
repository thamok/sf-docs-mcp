# Sample Codex config for hosted sf-docs-mcp usage
model = "gpt-5.3-codex"

[server]
base_url = "https://sf-docs-mcp.example.com"
timeout_seconds = 30

[auth]
type = "bearer"
env_var = "SF_DOCS_MCP_TOKEN"

[headers]
x_client = "codex"
[remote_mcp.salesforce_docs]
transport = "http"
url = "https://mcp.example.com"
headers = { Authorization = "Bearer ${MCP_BEARER_TOKEN}" }
timeout_seconds = 30
