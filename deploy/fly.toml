app = "sf-docs-mcp"
primary_region = "iad"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  HOSTED_MODE = "true"
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
