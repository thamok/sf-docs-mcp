name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Extraction / index / search tests
        run: pytest -q
      - name: Run eval harness
        run: python -m packages.evals.run_eval
